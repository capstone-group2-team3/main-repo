services:
  backend:
    build:
      context: .
    container_name: meddx_backend
    ports:
      - "8000:8000"
    volumes:
      - meddx_data:/app/runtime
      - meddx_reports:/app/reports/generated_reports
      - hf_cache:/app/.cache/huggingface
      - ./models/severity_classifier:/app/models/severity_classifier:ro
    environment:
      DATABASE_URL: sqlite:////app/runtime/meddx.db
      QDRANT_URL: http://qdrant:6333
      SEVERITY_MODEL_PATH: /app/models/severity_classifier
      SEVERITY_CONFIDENCE_THRESHOLD: "0.60"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      EMBEDDING_MODEL_NAME: NeuML/pubmedbert-base-embeddings
      EMBEDDING_VECTOR_DIMENSION: "768"
      EMBEDDING_LOCAL_FILES_ONLY: "false"
      HF_HOME: /app/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: meddx_frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: meddx_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  indexer:
    build:
      context: .
    profiles:
      - setup
    container_name: meddx_indexer
    volumes:
      - meddx_data:/app/runtime
      - hf_cache:/app/.cache/huggingface
      - ./models/severity_classifier:/app/models/severity_classifier:ro
    environment:
      DATABASE_URL: sqlite:////app/runtime/meddx.db
      QDRANT_URL: http://qdrant:6333
      SEVERITY_MODEL_PATH: /app/models/severity_classifier
      SEVERITY_CONFIDENCE_THRESHOLD: "0.60"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      EMBEDDING_MODEL_NAME: NeuML/pubmedbert-base-embeddings
      EMBEDDING_VECTOR_DIMENSION: "768"
      EMBEDDING_LOCAL_FILES_ONLY: "false"
      HF_HOME: /app/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    command: python -c "from app.db.database import Base, engine, SessionLocal; from app.db import models, severity_models; from app.services.knowledge_indexer import KnowledgeIndexer; Base.metadata.create_all(bind=engine); db = SessionLocal(); print(KnowledgeIndexer().index_medical_knowledge(db)); db.close()"

volumes:
  meddx_data:
  meddx_reports:
  qdrant_storage:
  hf_cache:
